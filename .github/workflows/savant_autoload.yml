name: Daily AWS RDS Savant Update

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12 PM UTC (7 AM CST)
  workflow_dispatch:

jobs:
  update-awsrds:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📅 Check if MLB season is active
        id: season_check
        run: |
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          SEASON_START="0320"
          SEASON_END="1105"
          MMDD=$(printf "%02d%02d" $MONTH $DAY)
          if [[ "$MMDD" < "$SEASON_START" || "$MMDD" > "$SEASON_END" ]]; then
            echo "⚾ Off-season detected ($MONTH/$DAY) — skipping ETL."
            echo "in_season=false" >> $GITHUB_OUTPUT
          else
            echo "⚾ Season active ($MONTH/$DAY) — proceeding with ETL."
            echo "in_season=true" >> $GITHUB_OUTPUT
          fi

      - name: 📥 Checkout repo
        if: steps.season_check.outputs.in_season == 'true'
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.11
        if: steps.season_check.outputs.in_season == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_etl.txt

      - name: 🌐 Get Runner Public IP
        if: steps.season_check.outputs.in_season == 'true'
        id: ip
        run: |
          # Try multiple services to get the external IPv4
          RUNNER_IP=$(curl -4 -s https://checkip.amazonaws.com || curl -4 -s https://ifconfig.me || curl -4 -s https://api.ipify.org)
          echo "ipv4=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "🎯 Detected Runner IP: $RUNNER_IP"

      - name: 🔐 Configure AWS Credentials (OIDC)
        if: steps.season_check.outputs.in_season == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: 🔍 AWS RDS & Security Group Diagnosis
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          echo "===================================================="
          echo "📡 STEP 1: Querying RDS Instances in us-east-1..."
          echo "===================================================="
          aws rds describe-db-instances \
            --query "DBInstances[*].{Identifier:DBInstanceIdentifier,Status:DBInstanceStatus,Endpoint:Endpoint.Address,SecurityGroups:VpcSecurityGroups[*].VpcSecurityGroupId}" \
            --output json

          echo "===================================================="
          echo "🔑 STEP 2: Checking Configured Secret SG ID..."
          echo "===================================================="
          SECRET_SG="${{ secrets.RDS_SECURITY_GROUP_ID }}"
          echo "Configured Secret SG ID: $SECRET_SG"

          echo "===================================================="
          echo "🛡️ STEP 3: Describing Configured SG Rules..."
          echo "===================================================="
          aws ec2 describe-security-groups \
            --group-ids "$SECRET_SG" \
            --query "SecurityGroups[*].{GroupId:GroupId,GroupName:GroupName,IpPermissions:IpPermissions[*].{FromPort:FromPort,ToPort:ToPort,IpRanges:IpRanges[*].CidrIp}}" \
            --output json

      - name: 🧱 Temporarily Open RDS SG for ETL
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          SG_ID="${{ secrets.RDS_SECURITY_GROUP_ID }}"
          echo "🔓 Opening Security Group $SG_ID to 0.0.0.0/0 for the duration of the ETL..."
          
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 5432 \
            --cidr "0.0.0.0/0" 2> sg_err.txt || {
              if grep -q "InvalidPermission.Duplicate" sg_err.txt; then
                echo "ℹ️ Note: 0.0.0.0/0 rule already exists."
              else
                cat sg_err.txt
                echo "❌ CRITICAL: Failed to authorize SG!"
                exit 1
              fi
            }
          
          echo "⏳ Waiting for SG propagation..."
          for i in {1..4}; do
            echo "🔍 Connectivity check $i/6..."
            if nc -zv -w 5 ${{ secrets.AWSHOST }} 5432; then
              echo "✅ Port 5432 is OPEN."
              break
            else
              echo "⏳ Still waiting... (10s)"
              sleep 10
            fi
            if [ $i -eq 6 ]; then
              echo "❌ ERROR: Port 5432 never opened after 60s."
              # We don't exit 1 here to let the Python script try its own retries, but we logged the failure.
            fi
          done

      - name: 🔄 Run AWS RDS ETL update (Savant)
        if: steps.season_check.outputs.in_season == 'true'
        env:
          AWSHOST: ${{ secrets.AWSHOST }}
          AWSPORT: ${{ secrets.AWSPORT }}
          AWSDATABASE: ${{ secrets.AWSDATABASE }}
          AWSUSER: ${{ secrets.AWSUSER }}
          AWSPASSWORD: ${{ secrets.AWSPASSWORD }}
        run: |
          python -u etl/update_savant_awsrds.py

      - name: "🧹 Cleanup: Close RDS SG"
        if: always() && steps.season_check.outputs.in_season == 'true'
        run: |
          echo "🔒 Revoking 0.0.0.0/0 from Security Group..."
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.RDS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 5432 \
            --cidr "0.0.0.0/0" || echo "Cleanup complete."
