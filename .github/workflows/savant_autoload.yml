name: Daily AWS RDS Savant Update

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12 PM UTC (7 AM CST)
  workflow_dispatch:

jobs:
  update-awsrds:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📅 Check if MLB season is active
        id: season_check
        run: |
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          SEASON_START="0320"
          SEASON_END="1105"
          MMDD=$(printf "%02d%02d" $MONTH $DAY)
          if [[ "$MMDD" < "$SEASON_START" || "$MMDD" > "$SEASON_END" ]]; then
            echo "⚾ Off-season detected ($MONTH/$DAY) — skipping ETL."
            echo "in_season=false" >> $GITHUB_OUTPUT
          else
            echo "⚾ Season active ($MONTH/$DAY) — proceeding with ETL."
            echo "in_season=true" >> $GITHUB_OUTPUT
          fi

      - name: 📥 Checkout repo
        if: steps.season_check.outputs.in_season == 'true'
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.11
        if: steps.season_check.outputs.in_season == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_etl.txt

      - name: 🌐 Get Runner Public IP
        if: steps.season_check.outputs.in_season == 'true'
        id: ip
        run: |
          # Try multiple services to get the external IPv4
          RUNNER_IP=$(curl -4 -s https://checkip.amazonaws.com || curl -4 -s https://ifconfig.me || curl -4 -s https://api.ipify.org)
          echo "ipv4=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "🎯 Detected Runner IP: $RUNNER_IP"

      - name: 🔐 Configure AWS Credentials (OIDC)
        if: steps.season_check.outputs.in_season == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: 🧱 Whitelist Runner IP in RDS SG
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          IP="${{ steps.ip.outputs.ipv4 }}"
          SG_ID="${{ secrets.RDS_SECURITY_GROUP_ID }}"
          echo "🔓 Whitelisting IP $IP in Security Group $SG_ID..."
          
          # Attempt to authorize, ignore if already exists
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 5432 \
            --cidr "$IP/32" || echo "ℹ️ Note: Rule might already exist or authorization failed."
          
          echo "📝 Current ingress rules for SG $SG_ID (port 5432):"
          aws ec2 describe-security-groups --group-ids "$SG_ID" --query "SecurityGroups[0].IpPermissions[?ToPort==\`5432\`].IpRanges" --output table
          
          echo "⏳ Waiting for SG propagation and port readiness..."
          for i in {1..6}; do
            echo "🔍 Connectivity check $i/6..."
            if nc -zv -w 5 ${{ secrets.AWSHOST }} 5432; then
              echo "✅ Port 5432 is OPEN."
              break
            else
              echo "⏳ Still waiting... (10s)"
              sleep 10
            fi
            if [ $i -eq 6 ]; then
              echo "❌ ERROR: Port 5432 never opened after 60s."
              # We don't exit 1 here to let the Python script try its own retries, but we logged the failure.
            fi
          done

      - name: 🔄 Run AWS RDS ETL update (Savant)
        if: steps.season_check.outputs.in_season == 'true'
        env:
          AWSHOST: ${{ secrets.AWSHOST }}
          AWSPORT: ${{ secrets.AWSPORT }}
          AWSDATABASE: ${{ secrets.AWSDATABASE }}
          AWSUSER: ${{ secrets.AWSUSER }}
          AWSPASSWORD: ${{ secrets.AWSPASSWORD }}
        run: |
          python -u etl/update_savant_awsrds.py

      - name: "🧹 Cleanup: Revoke Runner IP"
        if: always() && steps.season_check.outputs.in_season == 'true'
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.RDS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 5432 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
