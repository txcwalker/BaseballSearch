name: Daily AWS RDS FanGraphs Update

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 12 PM UTC (7 AM CST)
  workflow_dispatch:

jobs:
  update-awsrds:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📅 Check if MLB season is active
        id: season_check
        run: |
          MONTH=$(date -u +%-m)
          DAY=$(date -u +%-d)
          SEASON_START="0320"
          SEASON_END="1105"
          MMDD=$(printf "%02d%02d" $MONTH $DAY)
          if [[ "$MMDD" < "$SEASON_START" || "$MMDD" > "$SEASON_END" ]]; then
            echo "⚾ Off-season detected ($MONTH/$DAY) — skipping ETL."
            echo "in_season=false" >> $GITHUB_OUTPUT
          else
            echo "⚾ Season active ($MONTH/$DAY) — proceeding with ETL."
            echo "in_season=true" >> $GITHUB_OUTPUT
          fi

      - name: 📥 Checkout repo
        if: steps.season_check.outputs.in_season == 'true'
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.11
        if: steps.season_check.outputs.in_season == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_etl.txt

      - name: 🌐 Get Runner Public IP
        if: steps.season_check.outputs.in_season == 'true'
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: 🔐 Configure AWS Credentials (OIDC)
        if: steps.season_check.outputs.in_season == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: 🧱 Whitelist Runner IP in RDS SG
        if: steps.season_check.outputs.in_season == 'true'
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.RDS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 5432 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: 🔄 Run AWS RDS ETL update (Playwright)
        if: steps.season_check.outputs.in_season == 'true'
        env:
          AWSHOST: ${{ secrets.AWSHOST }}
          AWSPORT: ${{ secrets.AWSPORT }}
          AWSDATABASE: ${{ secrets.AWSDATABASE }}
          AWSUSER: ${{ secrets.AWSUSER }}
          AWSPASSWORD: ${{ secrets.AWSPASSWORD }}
        run: |
          python etl/update_fangraphs_playwright.py

      - name: "🧹 Cleanup: Revoke Runner IP"
        if: always() && steps.season_check.outputs.in_season == 'true'
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.RDS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 5432 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
