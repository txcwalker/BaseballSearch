leaders_batting_counting:
  description: "Top N leaders for a counting batting stat with ties (Savant current season, Lahman historical fallback)"
  patterns:
    - "(?i)(?:leaders?|top\\s*(?P<top_n>\\d+))\\s+in\\s+(?P<stat_label>hr|home runs?)\\s+(?:in|for)\\s+(?P<season>\\d{4})"
    - "(?i)who\\s+(?:leads?|are\\s+the\\s+leaders?).*\\b(?P<stat_label>hr|home\\s*runs?)\\b.*\\b(?P<season>\\d{4})"
    - "(?i)most\\s+(?P<stat_label>hr|home\\s*runs?)\\s+(?:in|for)\\s+(?P<season>\\d{4})"
  params: ["season", "top_n", "stat_col_savant", "stat_col_lahman", "stat_label"]
  defaults: { top_n: 10, stat_col_savant: "b_home_run", stat_col_lahman: "hr" }
  param_types: { season: int, top_n: int }
  sql: |
    WITH base AS (
      SELECT DISTINCT ON (id, season, team)
             id,
             season,
             team,
             name,
             stat,
             pa,
             g
      FROM (
        -- Use Savant if it has rows for the requested season (the current, in-progress season)
        SELECT s.player_id::text AS id, s.year AS season, s.team AS team,
               CASE WHEN position(', ' in s.playername) > 0
                    THEN split_part(s.playername, ', ', 2) || ' ' || split_part(s.playername, ', ', 1)
                    ELSE s.playername END AS name,
               s.{{ stat_col_savant }} AS stat, s.b_total_pa AS pa, s.b_game AS g
        FROM savant_batting_traditional s
        WHERE s.year = %(season)s

        UNION ALL

        -- Otherwise fall back to Lahman (any season Savant doesn't have). Lahman
        -- has no 'TOT' row -- pre-sum multi-stint rows per team before they reach
        -- the traded-player logic below (which expects one row per team already).
        SELECT bat.playerid AS id, bat.yearid AS season, bat.teamid AS team,
               peo.namefirst || ' ' || peo.namelast AS name,
               SUM(bat.{{ stat_col_lahman }}) AS stat, SUM(bat.ab) AS pa, SUM(bat.g) AS g
        FROM batting bat
        JOIN people peo ON peo.playerid = bat.playerid
        WHERE bat.yearid = %(season)s
          AND NOT EXISTS (SELECT 1 FROM savant_batting_traditional s2 WHERE s2.year = %(season)s)
        GROUP BY bat.playerid, bat.yearid, bat.teamid, peo.namefirst, peo.namelast
      ) all_stats
      ORDER BY id, season, team, pa DESC, g DESC, stat DESC
    ),
    player AS (
      SELECT
        id,
        MAX(name) AS name,
        COALESCE(
          MAX(stat) FILTER (WHERE team = 'TOT'),
          SUM(stat) FILTER (WHERE team NOT IN ('TOT','---'))
        )::numeric AS "{{ stat_label }}"
      FROM base
      GROUP BY id
    )
    SELECT name, "{{ stat_label }}"
    FROM player
    ORDER BY "{{ stat_label }}" DESC, name ASC
    FETCH FIRST %(top_n)s ROWS WITH TIES;


leaders_pitching_counting:
  description: "Top N leaders for a counting pitching stat with ties (Savant current season, Lahman historical fallback)"
  params: ["season", "top_n", "stat_col_savant", "stat_col_lahman", "stat_label"]
  defaults: { top_n: 10, stat_col_savant: "p_strikeout", stat_col_lahman: "so" }
  param_types: { season: int, top_n: int }
  sql: |
    WITH base AS (
      SELECT DISTINCT ON (id, season, team)
             id,
             season,
             team,
             name,
             stat,
             qual,
             g
      FROM (
        -- Use Savant if it has rows for the requested season (the current, in-progress season)
        SELECT s.player_id::text AS id, s.year AS season, s.team AS team,
               CASE WHEN position(', ' in s.playername) > 0
                    THEN split_part(s.playername, ', ', 2) || ' ' || split_part(s.playername, ', ', 1)
                    ELSE s.playername END AS name,
               s.{{ stat_col_savant }} AS stat, s.p_game AS qual, s.p_game AS g
        FROM savant_pitching_traditional s
        WHERE s.year = %(season)s

        UNION ALL

        -- Otherwise fall back to Lahman (any season Savant doesn't have). Lahman
        -- has no 'TOT' row -- pre-sum multi-stint rows per team before they reach
        -- the traded-player logic below (which expects one row per team already).
        SELECT pit.playerid AS id, pit.yearid AS season, pit.teamid AS team,
               peo.namefirst || ' ' || peo.namelast AS name,
               SUM(pit.{{ stat_col_lahman }}) AS stat, SUM(pit.ipouts) AS qual, SUM(pit.g) AS g
        FROM pitching pit
        JOIN people peo ON peo.playerid = pit.playerid
        WHERE pit.yearid = %(season)s
          AND NOT EXISTS (SELECT 1 FROM savant_pitching_traditional s2 WHERE s2.year = %(season)s)
        GROUP BY pit.playerid, pit.yearid, pit.teamid, peo.namefirst, peo.namelast
      ) all_stats
      ORDER BY id, season, team, qual DESC, g DESC, stat DESC
    ),
    pitcher AS (
      SELECT
        id,
        MAX(name) AS name,
        COALESCE(
          MAX(stat) FILTER (WHERE team = 'TOT'),
          SUM(stat) FILTER (WHERE team NOT IN ('TOT','---'))
        )::numeric AS "{{ stat_label }}"
      FROM base
      GROUP BY id
    )
    SELECT name, "{{ stat_label }}"
    FROM pitcher
    ORDER BY "{{ stat_label }}" DESC, name ASC
    FETCH FIRST %(top_n)s ROWS WITH TIES;


leaders_batting_rate:
  description: "Top N leaders for a batting rate stat with ties (weighted, Savant current season, Lahman historical fallback). NOTE: not currently reachable from any live routing path -- see AGENTS.md."
  params: ["season", "top_n", "stat_col_savant", "stat_expr_lahman", "stat_label"]
  defaults: { top_n: 10 }
  param_types: { season: int, top_n: int }
  sql: |
    WITH base AS (
      SELECT DISTINCT ON (id, season, team)
             id, season, team, name, stat, pa, g
      FROM (
        SELECT s.player_id::text AS id, s.year AS season, s.team AS team,
               CASE WHEN position(', ' in s.playername) > 0
                    THEN split_part(s.playername, ', ', 2) || ' ' || split_part(s.playername, ', ', 1)
                    ELSE s.playername END AS name,
               r.{{ stat_col_savant }} AS stat, s.b_total_pa AS pa, s.b_game AS g
        FROM savant_batting_traditional s
        JOIN savant_batting_ratios r ON r.player_id = s.player_id AND r.year = s.year
        WHERE s.year = %(season)s

        UNION ALL

        SELECT bat.playerid AS id, bat.yearid AS season, bat.teamid AS team,
               peo.namefirst || ' ' || peo.namelast AS name,
               {{ stat_expr_lahman }} AS stat, SUM(bat.ab) AS pa, SUM(bat.g) AS g
        FROM batting bat
        JOIN people peo ON peo.playerid = bat.playerid
        WHERE bat.yearid = %(season)s
          AND NOT EXISTS (SELECT 1 FROM savant_batting_traditional s2 WHERE s2.year = %(season)s)
        GROUP BY bat.playerid, bat.yearid, bat.teamid, peo.namefirst, peo.namelast
      ) all_stats
      ORDER BY id, season, team, pa DESC, g DESC
    ),
    player AS (
      SELECT
        id,
        MAX(name) AS name,
        COALESCE(
          MAX(stat) FILTER (WHERE team = 'TOT'),
          SUM(stat * pa)::numeric / NULLIF(SUM(pa), 0)
        ) AS "{{ stat_label }}"
      FROM base
      GROUP BY id
    )
    SELECT name, "{{ stat_label }}"
    FROM player
    WHERE "{{ stat_label }}" IS NOT NULL
    ORDER BY "{{ stat_label }}" DESC, name ASC
    FETCH FIRST %(top_n)s ROWS WITH TIES;


leaders_pitching_rate_low_is_best:
  description: "Top N leaders for a pitching rate stat (lower is better) with ties (weighted, Savant current season, Lahman historical fallback). NOTE: not currently reachable from any live routing path -- see AGENTS.md."
  params: ["season", "top_n", "stat_col_savant", "stat_expr_lahman", "stat_label"]
  defaults: { top_n: 10, stat_col_savant: "p_era" }
  param_types: { season: int, top_n: int }
  sql: |
    WITH base AS (
      SELECT DISTINCT ON (id, season, team)
             id, season, team, name, stat, qual, g
      FROM (
        SELECT s.player_id::text AS id, s.year AS season, s.team AS team,
               CASE WHEN position(', ' in s.playername) > 0
                    THEN split_part(s.playername, ', ', 2) || ' ' || split_part(s.playername, ', ', 1)
                    ELSE s.playername END AS name,
               r.{{ stat_col_savant }} AS stat, s.p_game AS qual, s.p_game AS g
        FROM savant_pitching_traditional s
        JOIN savant_pitching_ratios r ON r.player_id = s.player_id AND r.year = s.year
        WHERE s.year = %(season)s

        UNION ALL

        SELECT pit.playerid AS id, pit.yearid AS season, pit.teamid AS team,
               peo.namefirst || ' ' || peo.namelast AS name,
               {{ stat_expr_lahman }} AS stat, SUM(pit.ipouts) AS qual, SUM(pit.g) AS g
        FROM pitching pit
        JOIN people peo ON peo.playerid = pit.playerid
        WHERE pit.yearid = %(season)s
          AND NOT EXISTS (SELECT 1 FROM savant_pitching_traditional s2 WHERE s2.year = %(season)s)
        GROUP BY pit.playerid, pit.yearid, pit.teamid, peo.namefirst, peo.namelast
      ) all_stats
      ORDER BY id, season, team, qual DESC, g DESC
    ),
    pitcher AS (
      SELECT
        id,
        MAX(name) AS name,
        COALESCE(
          MAX(stat) FILTER (WHERE team = 'TOT'),
          SUM(stat * qual)::numeric / NULLIF(SUM(qual), 0)
        ) AS "{{ stat_label }}"
      FROM base
      GROUP BY id
    )
    SELECT name, "{{ stat_label }}"
    FROM pitcher
    WHERE "{{ stat_label }}" IS NOT NULL
    ORDER BY "{{ stat_label }}" ASC, name ASC
    FETCH FIRST %(top_n)s ROWS WITH TIES;

leaders_batting_qualified:
  description: "Top N leaders for a batting stat with PA qualification (3.1 * max team games), ties, Savant current season / Lahman historical fallback"
  params: ["season", "top_n", "stat_col_savant", "stat_col_lahman", "stat_label"]
  defaults: { top_n: 10 }
  param_types: { season: int, top_n: int }
  sql: |
    WITH tg AS (
      SELECT MAX(g) AS max_games
      FROM (
        SELECT b_game AS g, year AS season FROM savant_batting_traditional
        UNION ALL
        SELECT g, yearid AS season FROM batting
        WHERE NOT EXISTS (SELECT 1 FROM savant_batting_traditional s2 WHERE s2.year = batting.yearid)
      ) all_g
      WHERE season = %(season)s
    ),
    base AS (
      SELECT DISTINCT ON (id, season, team)
             id, season, team, name, stat, pa, g
      FROM (
        -- Use Savant if it has rows for the requested season (the current, in-progress season)
        SELECT player_id::text AS id, year AS season, team AS team,
               CASE WHEN position(', ' in playername) > 0
                    THEN split_part(playername, ', ', 2) || ' ' || split_part(playername, ', ', 1)
                    ELSE playername END AS name,
               {{ stat_col_savant }} AS stat, b_total_pa AS pa, b_game AS g
        FROM savant_batting_traditional
        WHERE year = %(season)s
        UNION ALL
        -- Otherwise fall back to Lahman (any season Savant doesn't have)
        SELECT bat.playerid AS id, bat.yearid AS season, bat.teamid AS team,
               peo.namefirst || ' ' || peo.namelast AS name,
               SUM(bat.{{ stat_col_lahman }}) AS stat, SUM(bat.ab) AS pa, SUM(bat.g) AS g
        FROM batting bat
        JOIN people peo ON peo.playerid = bat.playerid
        WHERE bat.yearid = %(season)s
          AND NOT EXISTS (SELECT 1 FROM savant_batting_traditional s2 WHERE s2.year = %(season)s)
        GROUP BY bat.playerid, bat.yearid, bat.teamid, peo.namefirst, peo.namelast
      ) all_stats
      ORDER BY id, season, team, pa DESC, g DESC
    ),
    player AS (
      SELECT
        id,
        MAX(name) AS name,
        COALESCE(
          MAX(pa) FILTER (WHERE team = 'TOT'),
          SUM(pa) FILTER (WHERE team NOT IN ('TOT','---'))
        ) AS pa_total,
        COALESCE(
          MAX(stat) FILTER (WHERE team = 'TOT'),
          SUM(stat) FILTER (WHERE team NOT IN ('TOT','---'))
        )::numeric AS "{{ stat_label }}"
      FROM base
      GROUP BY id
    ),
    qualified AS (
      SELECT p.*
      FROM player p, tg
      WHERE p.pa_total >= (3.1 * tg.max_games)
    )
    SELECT name, "{{ stat_label }}"
    FROM qualified
    ORDER BY "{{ stat_label }}" DESC, name ASC
    FETCH FIRST %(top_n)s ROWS WITH TIES;


player_pitching_career_by_season:
  description: "A single pitcher's ERA and FIP by season (FanGraphs, 2002+)"
  patterns:
    - "(?i)(?P<name>[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)+)'?s?\\s+(?:era|fip|stats?|numbers?)\\s+(?:by|each|per)\\s+season"
    - "(?i)show\\s+(?P<name>[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)+)'?s?\\s+(?:era|fip|career|pitching)"
    - "(?i)(?P<name>[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)+)\\s+(?:era|fip)\\s+(?:by|each)\\s+season"
  params: ["player_name"]
  defaults: {}
  sql: |
    SELECT
      fpr.season,
      fpr.name,
      fpr.team,
      fpr.era,
      fpa.fip,
      fpa.xfip,
      fpl.w,
      fpl.l,
      fpl.ip,
      fpl.so
    FROM fangraphs_pitching_standard_ratios fpr
    JOIN fangraphs_pitching_advanced fpa
      ON fpa.idfg = fpr.idfg AND fpa.season = fpr.season
    JOIN fangraphs_pitching_lahman_like fpl
      ON fpl.idfg = fpr.idfg AND fpl.season = fpr.season
    WHERE LOWER(fpr.name) = LOWER(%(player_name)s)
      AND fpr.team NOT IN ('TOT', '---')
       OR (
         fpr.idfg IN (SELECT idfg FROM fangraphs_pitching_lahman_like WHERE LOWER(name) = LOWER(%(player_name)s))
         AND fpr.team = 'TOT'
       )
    ORDER BY fpr.season ASC;


team_era_season:
  description: "Team ERA rankings for a given season, optionally filtered by league/division"
  patterns:
    - "(?i)(?:best|lowest|top|worst|highest)\\s+(?:bullpen\\s+)?era\\s+(?:in|for|during)\\s+(?P<season>\\d{4})"
    - "(?i)team\\s+era\\s+(?:in|for)\\s+(?P<season>\\d{4})"
    - "(?i)which\\s+teams?\\s+had\\s+the\\s+(?:best|lowest|worst|highest)\\s+(?:bullpen\\s+)?era\\s+(?:in|for)\\s+(?P<season>\\d{4})"
    - "(?i)(?:bullpen|pitching)\\s+era\\s+(?:rankings?|leaders?|in|for)\\s+(?P<season>\\d{4})"
  params: ["season"]
  defaults: { top_n: 10 }
  param_types: { season: int, top_n: int }
  sql: |
    SELECT
      tms.name AS team,
      tms.lgid AS league,
      tms.divid AS division,
      tms.era,
      tms.w,
      tms.l
    FROM teams tms
    WHERE tms.yearid = %(season)s
    ORDER BY tms.era ASC
    LIMIT %(top_n)s;


team_batting_avg_division:
  description: "Compare team batting averages within a division and season"
  patterns:
    - "(?i)(?:compare|show|list)\\s+(?:the\\s+)?batting\\s+averages?\\s+of\\s+(?:all\\s+)?(?:the\\s+)?(?P<league>AL|NL|American League|National League)?\\s*(?P<division>East|West|Central)\\s+teams?\\s+(?:in|for|during)\\s+(?P<season>\\d{4})"
    - "(?i)(?P<league>AL|NL)\\s+(?P<division>East|West|Central)\\s+(?:team\\s+)?batting\\s+averages?\\s+(?:in|for)\\s+(?P<season>\\d{4})"
    - "(?i)batting\\s+averages?\\s+(?:for|of)\\s+(?:all\\s+)?(?P<league>AL|NL)\\s+(?P<division>East|West|Central)\\s+teams?\\s+(?:in|for)?\\s*(?P<season>\\d{4})"
  params: ["season", "league", "division"]
  param_types: { season: int }
  sql: |
    SELECT
      tms.name AS team,
      ROUND(tms.h::numeric / NULLIF(tms.ab, 0), 3) AS avg,
      tms.h AS hits,
      tms.ab AS at_bats,
      tms.w AS wins,
      tms.l AS losses
    FROM teams tms
    WHERE tms.yearid = %(season)s
      AND tms.lgid = %(league)s
      AND tms.divid = %(division)s
    ORDER BY avg DESC;


team_season_stats:
  description: "General team stats for a given season"
  patterns:
    - "(?i)(?P<team_name>[A-Z][a-zA-Z ]+(?:Yankees|Red Sox|Dodgers|Giants|Cubs|Cardinals|Braves|Mets|Phillies|Nationals|Marlins|Reds|Pirates|Brewers|Padres|Rockies|Diamondbacks|Angels|Astros|Athletics|Rangers|Mariners|Blue Jays|Orioles|Rays|Tigers|Indians|Guardians|White Sox|Royals|Twins|Padres))[^\\d]*(?P<season>\\d{4})"
    - "(?i)how\\s+did\\s+the\\s+(?P<team_name>[\\w\\s]+?)\\s+do\\s+in\\s+(?P<season>\\d{4})"
  params: ["season", "team_name"]
  param_types: { season: int }
  sql: |
    SELECT
      tms.name AS team,
      tms.w AS wins,
      tms.l AS losses,
      tms.era,
      ROUND(tms.h::numeric / NULLIF(tms.ab, 0), 3) AS team_avg,
      tms.hr AS home_runs,
      tms.r AS runs_scored,
      tms.ra AS runs_allowed
    FROM teams tms
    WHERE tms.yearid = %(season)s
      AND LOWER(tms.name) LIKE LOWER(%(team_name)s)
    ORDER BY tms.w DESC;